<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Banadir School | BEST Education 2030</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', 'Segoe UI', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a1928 0%, #0b2b3b 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background particles */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle at 20% 40%, rgba(255, 140, 0, 0.08) 0%, transparent 50%),
                              radial-gradient(circle at 80% 70%, rgba(255, 140, 0, 0.05) 0%, transparent 50%);
            pointer-events: none;
        }

        /* Main Container */
        .container {
            width: 100%;
            max-width: 1400px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(2px);
            border-radius: 48px;
            padding: 25px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Login Card */
        .login-card {
            max-width: 450px;
            margin: 50px auto;
            background: rgba(10, 25, 40, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 40px 35px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 140, 0, 0.2);
            animation: fadeInUp 0.6s ease;
            border: 1px solid rgba(255, 140, 0, 0.3);
        }

        .login-card h2 {
            color: #fff;
            font-size: 28px;
            margin-bottom: 10px;
            text-align: center;
        }

        .login-card h2 i {
            color: #ff8c00;
            margin-right: 12px;
        }

        .login-card p {
            color: rgba(255,255,255,0.7);
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 25px;
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #ff8c00;
            font-size: 18px;
        }

        .input-group input {
            width: 100%;
            padding: 15px 20px 15px 50px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 140, 0, 0.4);
            border-radius: 60px;
            font-size: 16px;
            color: #fff;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: #ff8c00;
            box-shadow: 0 0 15px rgba(255, 140, 0, 0.3);
            background: rgba(255, 255, 255, 0.12);
        }

        .input-group input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #ff8c00, #ff6a00);
            border: none;
            border-radius: 60px;
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(255, 140, 0, 0.3);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 140, 0, 0.4);
        }

        .login-btn:active {
            transform: translateY(1px);
        }

        .error-msg {
            background: rgba(255, 70, 70, 0.2);
            border-left: 4px solid #ff4646;
            padding: 12px 18px;
            border-radius: 12px;
            margin-top: 20px;
            color: #ffaeae;
            font-size: 14px;
            text-align: center;
        }

        .timer-msg {
            background: rgba(255, 140, 0, 0.2);
            border-left: 4px solid #ff8c00;
            padding: 12px 18px;
            border-radius: 12px;
            margin-top: 20px;
            color: #ffc107;
            font-weight: bold;
            text-align: center;
        }

        /* Main Dashboard */
        .dashboard {
            display: none;
            animation: fadeInScale 0.5s ease;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 25px;
            background: linear-gradient(135deg, rgba(10, 25, 40, 0.8), rgba(0, 0, 0, 0.6));
            border-radius: 40px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 140, 0, 0.3);
        }

        .header h1 {
            font-size: 42px;
            background: linear-gradient(135deg, #fff, #ff8c00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .header h1 i {
            background: none;
            -webkit-background-clip: unset;
            color: #ff8c00;
            margin-right: 15px;
        }

        .subtitle {
            font-size: 24px;
            color: #fff;
            margin-top: 15px;
            font-weight: 500;
        }

        .subtitle span {
            color: #ff8c00;
        }

        /* Grade Selector */
        .grade-section {
            margin-bottom: 40px;
            text-align: center;
        }

        .grade-title {
            font-size: 22px;
            color: #fff;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .grade-title i {
            color: #ff8c00;
            font-size: 28px;
        }

        .grade-buttons {
            display: flex;
            gap: 18px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .grade-btn {
            padding: 14px 32px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 140, 0, 0.5);
            border-radius: 60px;
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .grade-btn i {
            margin-right: 8px;
            color: #ff8c00;
        }

        .grade-btn:hover {
            background: rgba(255, 140, 0, 0.2);
            transform: translateY(-3px);
            border-color: #ff8c00;
        }

        .grade-btn.active {
            background: linear-gradient(135deg, #ff8c00, #ff6a00);
            border-color: transparent;
            box-shadow: 0 8px 20px rgba(255, 140, 0, 0.4);
        }

        /* Links Grid */
        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 28px;
            margin-top: 30px;
        }

        .link-card {
            background: rgba(10, 25, 40, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 25px;
            border: 1px solid rgba(255, 140, 0, 0.3);
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            animation: fadeInUp 0.5s ease;
        }

        .link-card:hover {
            transform: translateY(-8px);
            border-color: #ff8c00;
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.5);
        }

        .link-card h3 {
            color: #ff8c00;
            font-size: 24px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 2px solid rgba(255, 140, 0, 0.3);
            padding-bottom: 12px;
        }

        .link-card h3 i {
            font-size: 26px;
        }

        .link-url {
            background: rgba(0, 0, 0, 0.4);
            padding: 12px 15px;
            border-radius: 16px;
            margin-bottom: 20px;
            word-break: break-all;
        }

        .link-url a {
            color: #ffae5a;
            text-decoration: none;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }

        .link-url a:hover {
            color: #ff8c00;
            text-decoration: underline;
        }

        .credentials-box {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            padding: 18px;
            margin-top: 15px;
        }

        .cred-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .cred-item:last-child {
            border-bottom: none;
        }

        .cred-item i {
            width: 32px;
            color: #ff8c00;
            font-size: 18px;
        }

        .cred-item span:first-of-type {
            font-weight: 600;
            color: rgba(255,255,255,0.7);
            min-width: 85px;
        }

        .cred-item span:last-child {
            color: #fff;
            font-family: monospace;
            font-size: 15px;
            letter-spacing: 0.5px;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.96);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .shake-animation {
            animation: shake 0.3s ease;
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }
            .header h1 {
                font-size: 28px;
            }
            .subtitle {
                font-size: 18px;
            }
            .grade-btn {
                padding: 10px 22px;
                font-size: 15px;
            }
            .links-grid {
                grid-template-columns: 1fr;
            }
        }

        .logout-btn {
            position: fixed;
            top: 25px;
            right: 35px;
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,140,0,0.5);
            color: #ff8c00;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.3s;
            z-index: 100;
            backdrop-filter: blur(8px);
        }

        .logout-btn:hover {
            background: #ff8c00;
            color: #0a1928;
            border-color: #fff;
        }
    </style>
</head>
<body>

<div class="container" id="appContainer">
    <!-- Login Section -->
    <div id="loginSection">
        <div class="login-card">
            <h2><i class="fas fa-graduation-cap"></i> Banadir School</h2>
            <p>Fadlan gal username & password-kaaga</p>
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="username" placeholder="Username" autocomplete="off">
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Password">
            </div>
            <button class="login-btn" id="loginBtn"><i class="fas fa-sign-in-alt"></i> Login</button>
            <div id="loginMessage"></div>
        </div>
    </div>

    <!-- Dashboard Section -->
    <div id="dashboardSection" class="dashboard">
        <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
        <div class="header">
            <h1><i class="fas fa-school"></i> Banadir School BEST</h1>
            <div class="subtitle"><i class="fas fa-star-of-life"></i> <span>Sahal Primary & Secondary School</span> <i class="fas fa-star-of-life"></i></div>
        </div>

        <div class="grade-section">
            <div class="grade-title">
                <i class="fas fa-layer-group"></i>
                <span>Dooro Fasalka</span>
                <i class="fas fa-chalkboard-user"></i>
            </div>
            <div class="grade-buttons" id="gradeButtons">
                <button class="grade-btn" data-grade="Grade 5"><i class="fas fa-book-open"></i> Grade 5</button>
                <button class="grade-btn" data-grade="Grade 6"><i class="fas fa-book-open"></i> Grade 6</button>
                <button class="grade-btn" data-grade="Grade 7"><i class="fas fa-book-open"></i> Grade 7</button>
                <button class="grade-btn" data-grade="Grade 8"><i class="fas fa-book-open"></i> Grade 8</button>
            </div>
        </div>

        <div id="linksContainer" class="links-grid"></div>
    </div>
</div>

<script>
    // Login State
    let failedAttempts = 0;
    let lockUntil = 0;
    let lockTimer = null;

    // Sample Links for each grade (each with Username & Password)
    const gradeLinks = {
        "Grade 5": [
            { name: "Math Hub", url: "https://grade5-math.example.com/portal", username: "student5_math", password: "math2025" },
            { name: "Science Lab", url: "https://grade5-science.example.com/learn", username: "sci5_learner", password: "science123" },
            { name: "English Zone", url: "https://grade5-english.example.com/class", username: "eng5_student", password: "english567" },
            { name: "English Zone", url: "https://grade5-english.example.com/class", username: "eng5_student", password: "english567" },
            { name: "English Zone", url: "https://grade5-english.example.com/class", username: "eng5_student", password: "english567" },
            { name: "English Zone", url: "https://grade5-english.example.com/class", username: "eng5_student", password: "english567" },
           


        ],
        "Grade 6": [
            { name: "Math Master", url: "https://grade6-math.example.com/dashboard", username: "g6_math_user", password: "math678" },
            { name: "Physics World", url: "https://grade6-physics.example.com/lab", username: "physics6_exp", password: "physics99" },
            { name: "Grammar Pro", url: "https://grade6-english.example.com/academy", username: "grammar6_usr", password: "grammar2026" },
            { name: "Physics World", url: "https://grade6-physics.example.com/lab", username: "physics6_exp", password: "physics99" },
            { name: "Physics World", url: "https://grade6-physics.example.com/lab", username: "physics6_exp", password: "physics99" },
            { name: "English Zone", url: "https://grade5-english.example.com/class", username: "eng5_student", password: "english567" },
            { name: "English Zone", url: "https://grade5-english.example.com/class", username: "eng5_student", password: "english567" },
            { name: "English Zone", url: "https://grade5-english.example.com/class", username: "eng5_student", password: "english567" },
            { name: "English Zone", url: "https://grade5-english.example.com/class", username: "eng5_student", password: "english567" },
            { name: "English Zone", url: "https://grade5-english.example.com/class", username: "eng5_student", password: "english567" },
            { name: "Physics World", url: "https://grade6-physics.example.com/lab", username: "physics6_exp", password: "physics99" },

        ],
        "Grade 7": [
            { name: "Safa Mohamed Hussein", url: "https://banadirschool.github.io/sahal-school-safo/", username: "Safa Mohamed", password: "SAH 005" },
            { name: "Suheyb Mohamed Hussein", url: "https://banadirschool.github.io/sahal-school-suheyb/", username: "Suheyb Mohamed", password: "SAH 011" },
            { name: "Nehal Abdifitah Osman", url: "https://banadirschool.github.io/Sahal-School-Nehal/", username: "Nehal Abdifitah", password: "SAH 006" },
            { name: "Literature Circle", url: "https://grade7-lit.example.com/read", username: "lit7_reader", password: "lit12345" },
            { name: "Literature Circle", url: "https://grade7-lit.example.com/read", username: "lit7_reader", password: "lit12345" },
            { name: "Literature Circle", url: "https://grade7-lit.example.com/read", username: "lit7_reader", password: "lit12345" },
            { name: "Literature Circle", url: "https://grade7-lit.example.com/read", username: "lit7_reader", password: "lit12345" },
            { name: "Literature Circle", url: "https://grade7-lit.example.com/read", username: "lit7_reader", password: "lit12345" }

        ],
        "Grade 8": [
            { name: "Advanced Math", url: "https://grade8-math.example.com/advanced", username: "adv_math8", password: "math8@2026" },
            { name: "Physics Advanced", url: "https://grade8-physics.example.com/quantum", username: "phy8_quantum", password: "physics8!" },
            { name: "Writing Studio", url: "https://grade8-writing.example.com/essay", username: "write8_usr", password: "essaypro" }
        ]
    };

    const loginBtn = document.getElementById('loginBtn');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const loginMessageDiv = document.getElementById('loginMessage');
    const loginSection = document.getElementById('loginSection');
    const dashboardSection = document.getElementById('dashboardSection');
    const logoutBtn = document.getElementById('logoutBtn');
    const gradeButtonsContainer = document.getElementById('gradeButtons');
    const linksContainer = document.getElementById('linksContainer');

    let activeGrade = "Grade 5";

    function showLoginMessage(msg, isError = true, isTimer = false) {
        loginMessageDiv.innerHTML = '';
        const msgDiv = document.createElement('div');
        if (isTimer) {
            msgDiv.className = 'timer-msg';
        } else {
            msgDiv.className = 'error-msg';
        }
        msgDiv.innerHTML = `<i class="fas ${isTimer ? 'fa-clock' : 'fa-exclamation-triangle'}"></i> ${msg}`;
        loginMessageDiv.appendChild(msgDiv);
    }

    function clearLoginMessage() {
        loginMessageDiv.innerHTML = '';
    }

    function disableLoginUI(disabled) {
        loginBtn.disabled = disabled;
        usernameInput.disabled = disabled;
        passwordInput.disabled = disabled;
        if (disabled) {
            loginBtn.style.opacity = '0.6';
            loginBtn.style.cursor = 'not-allowed';
        } else {
            loginBtn.style.opacity = '1';
            loginBtn.style.cursor = 'pointer';
        }
    }

    function startLockout() {
        lockUntil = Date.now() + 35000; // 35 seconds
        disableLoginUI(true);
        const remainingSeconds = 35;
        let secondsLeft = remainingSeconds;

        function updateTimer() {
            const now = Date.now();
            const remaining = Math.max(0, Math.ceil((lockUntil - now) / 1000));
            if (remaining <= 0) {
                clearInterval(lockTimer);
                disableLoginUI(false);
                failedAttempts = 0;
                showLoginMessage("Hada waad geli kartaa username iyo password-kaaga.", false, false);
                setTimeout(() => clearLoginMessage(), 3000);
                lockTimer = null;
            } else {
                showLoginMessage(`Sug ${remaining} seconds ka dib isku day mar kale.`, true, true);
            }
        }
        updateTimer();
        lockTimer = setInterval(updateTimer, 1000);
    }

    function handleLogin() {
        if (lockUntil && Date.now() < lockUntil) {
            const remain = Math.ceil((lockUntil - Date.now()) / 1000);
            showLoginMessage(`Fadlan sug ${remain} seconds ka hor isku day.`, true, true);
            return;
        } else if (lockUntil && Date.now() >= lockUntil) {
            lockUntil = 0;
            if (lockTimer) clearInterval(lockTimer);
            disableLoginUI(false);
            failedAttempts = 0;
        }

        const username = usernameInput.value.trim();
        const password = passwordInput.value;

        if (username === "Maa" && password === "123") {
            // Successful login
            clearLoginMessage();
            loginSection.style.display = "none";
            dashboardSection.style.display = "block";
            failedAttempts = 0;
            if (lockTimer) clearInterval(lockTimer);
            disableLoginUI(false);
            // show welcome message
            const welcomeMsg = document.createElement('div');
            welcomeMsg.style.position = 'fixed';
            welcomeMsg.style.bottom = '30px';
            welcomeMsg.style.right = '30px';
            welcomeMsg.style.background = '#ff8c00';
            welcomeMsg.style.color = '#0a1928';
            welcomeMsg.style.padding = '15px 25px';
            welcomeMsg.style.borderRadius = '50px';
            welcomeMsg.style.fontWeight = 'bold';
            welcomeMsg.style.zIndex = '999';
            welcomeMsg.style.boxShadow = '0 8px 20px rgba(0,0,0,0.3)';
            welcomeMsg.innerHTML = '<i class="fas fa-hand-peace"></i> Soo dhawaaw! ' + username;
            document.body.appendChild(welcomeMsg);
            setTimeout(() => welcomeMsg.remove(), 3000);
            
            // Render default grade links
            renderGradeLinks(activeGrade);
            setActiveGradeButton(activeGrade);
        } else {
            failedAttempts++;
            const errorMsg = (failedAttempts >= 4) ? `Waa qalad! ${failedAttempts} jeer ayaad qaldaysid. Sug 35 seconds.` : `Waa qalad! Password-kaaga ama username-ka waa qalad. Isku day ${4 - failedAttempts} ka hor inta aan la xidhin.`;
            showLoginMessage(errorMsg, true, false);
            if (failedAttempts >= 4) {
                startLockout();
            }
            // Shake animation
            const card = document.querySelector('.login-card');
            card.classList.add('shake-animation');
            setTimeout(() => card.classList.remove('shake-animation'), 300);
        }
    }

    function renderGradeLinks(grade) {
        const links = gradeLinks[grade];
        if (!links) return;
        
        linksContainer.innerHTML = '';
        links.forEach(link => {
            const card = document.createElement('div');
            card.className = 'link-card';
            card.innerHTML = `
                <h3><i class="fas fa-link"></i> ${link.name}</h3>
                <div class="link-url">
                    <a href="${link.url}" target="_blank"><i class="fas fa-external-link-alt"></i> ${link.url}</a>
                </div>
                <div class="credentials-box">
                    <div class="cred-item">
                        <i class="fas fa-user-circle"></i>
                        <span>User Name:</span>
                        <span>${link.username}</span>
                    </div>
                    <div class="cred-item">
                        <i class="fas fa-key"></i>
                        <span>Password:</span>
                        <span>${link.password}</span>
                    </div>
                </div>
            `;
            linksContainer.appendChild(card);
        });
    }

    function setActiveGradeButton(grade) {
        const btns = document.querySelectorAll('.grade-btn');
        btns.forEach(btn => {
            if (btn.getAttribute('data-grade') === grade) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
    }

    function logout() {
        dashboardSection.style.display = "none";
        loginSection.style.display = "block";
        usernameInput.value = "";
        passwordInput.value = "";
        failedAttempts = 0;
        if (lockTimer) clearInterval(lockTimer);
        lockUntil = 0;
        disableLoginUI(false);
        clearLoginMessage();
    }

    loginBtn.addEventListener('click', handleLogin);
    logoutBtn.addEventListener('click', logout);

    usernameInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleLogin();
    });
    passwordInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleLogin();
    });

    gradeButtonsContainer.addEventListener('click', (e) => {
        const btn = e.target.closest('.grade-btn');
        if (btn) {
            const grade = btn.getAttribute('data-grade');
            if (grade) {
                activeGrade = grade;
                renderGradeLinks(activeGrade);
                setActiveGradeButton(activeGrade);
            }
        }
    });

    // Initial render for links (when dashboard shown)
    function initDashboard() {
        renderGradeLinks("Grade 5");
        setActiveGradeButton("Grade 5");
    }
    
    // Override render after login display
    const originalSetDisplay = Object.getOwnPropertyDescriptor(HTMLElement.prototype, 'style').set;
    const observer = new MutationObserver(() => {
